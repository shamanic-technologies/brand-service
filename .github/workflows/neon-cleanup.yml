name: Cleanup Neon Branch

on:
  pull_request:
    types: [closed]

jobs:
  delete-neon-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Install Neon CLI
        run: npm install -g neonctl

      - name: Delete Neon branch
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          BRANCH_NAME="pr-${{ github.event.number }}"
          PROJECT_ID="${{ vars.NEON_PROJECT_ID }}"

          # Check if branch exists before attempting delete
          if neonctl branches list --project-id "$PROJECT_ID" --output json | jq -e ".[] | select(.name == \"$BRANCH_NAME\")" > /dev/null 2>&1; then
            echo "Deleting Neon branch: $BRANCH_NAME"
            neonctl branches delete "$BRANCH_NAME" --project-id "$PROJECT_ID"
            echo "Branch $BRANCH_NAME deleted successfully."
          else
            echo "Branch $BRANCH_NAME does not exist — nothing to delete."
          fi
